<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AT-Wallet | Secure System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div id="auth-card" class="max-w-md w-full glass rounded-[2.5rem] shadow-2xl p-10 border border-white">
        <div class="text-center mb-10">
            <div class="inline-flex p-4 bg-indigo-600 text-white rounded-3xl mb-4 shadow-xl">
                <i data-lucide="shield-check" class="w-10 h-10"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800">AT-Wallet</h1>
            <p class="text-slate-400 font-medium">Hệ thống ví bảo mật cao</p>
        </div>
        <div class="space-y-4">
            <input id="username" type="text" placeholder="Tên đăng nhập" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            <input id="password" type="password" placeholder="Mật khẩu" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            <div class="grid grid-cols-2 gap-4 pt-2">
                <button onclick="handleAuth('login')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">ĐĂNG NHẬP</button>
                <button onclick="handleAuth('register')" class="bg-white hover:bg-slate-50 text-indigo-600 border border-indigo-100 font-bold py-4 rounded-2xl transition-all active:scale-95">ĐĂNG KÝ</button>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden w-full max-w-5xl grid grid-cols-1 md:grid-cols-12 gap-6">
        
        <div class="md:col-span-4 space-y-6">
            <div class="glass rounded-[2rem] p-8 shadow-xl border border-white">
                <div class="flex items-center gap-4 mb-8">
                    <div id="user-initial" class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl">U</div>
                    <div>
                        <h2 id="user-name-display" class="font-bold text-slate-800 text-lg">---</h2>
                        <span id="trust-level-tag" class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest">Normal</span>
                    </div>
                </div>

                <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100 mb-6">
                    <label class="text-[10px] font-bold text-slate-400 uppercase block mb-1">Trust Score</label>
                    <div class="flex items-baseline justify-between">
                        <span id="trust-score-value" class="text-4xl font-extrabold text-slate-900">0.0</span>
                        <span class="text-xs font-bold text-emerald-500">↑ High</span>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Lịch sử thay đổi</label>
                    <div style="height: 150px; width: 100%;">
                        <canvas id="trustChart"></canvas>
                    </div>
                </div>

                <button onclick="handleLogout()" class="w-full mt-8 py-3 text-slate-400 hover:text-rose-500 font-bold text-xs transition-colors flex items-center justify-center gap-2 uppercase tracking-tighter">
                    <i data-lucide="log-out" class="w-4 h-4"></i> Đăng xuất hệ thống
                </button>
            </div>
        </div>

        <div class="md:col-span-8 space-y-6">
            <div class="flex p-2 bg-white rounded-3xl shadow-sm border border-white gap-2">
                <button id="tab-home" onclick="switchToHome()" class="flex-1 py-4 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 bg-indigo-600 text-white shadow-indigo-200 shadow-lg">
                    <i data-lucide="wallet" class="w-5 h-5"></i> VÍ CỦA TÔI
                </button>
                <button id="tab-trans" onclick="switchToTrans()" class="flex-1 py-4 rounded-2xl font-bold text-slate-400 hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="send" class="w-5 h-5"></i> CHUYỂN TIỀN
                </button>
            </div>

            <div id="home-screen" class="space-y-6">
                <div class="bg-slate-900 rounded-[2.5rem] p-10 text-white relative overflow-hidden shadow-2xl">
                    <div class="relative z-10">
                        <p class="text-slate-400 font-bold text-sm uppercase tracking-widest mb-2">Tổng số dư khả dụng</p>
                        <h2 id="home-balance" class="text-5xl font-black mb-6">0.00 SOL</h2>
                        <div class="flex gap-4">
                            <div class="px-4 py-2 bg-white/10 rounded-xl text-xs font-bold border border-white/10 italic">Blockchain: Solana Mainnet</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="trans-screen" class="hidden glass rounded-[2.5rem] p-10 shadow-xl border border-white">
                <h2 class="text-2xl font-black text-slate-800 mb-8 flex items-center gap-3">
                    <i data-lucide="arrow-right-circle" class="text-indigo-600"></i> Gửi SOL an toàn
                </h2>
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-400 uppercase mb-2 ml-1">Địa chỉ người nhận</label>
                        <input id="recipient" type="text" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Nhập tên người dùng hoặc địa chỉ ví">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-400 uppercase mb-2 ml-1">Số lượng gửi</label>
                            <input id="amount" type="number" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="0.0">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-400 uppercase mb-2 ml-1">Xác nhận mật khẩu</label>
                            <input id="tx-password" type="password" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Nhập lại mật khẩu">
                        </div>
                    </div>
                    <div class="text-xs text-slate-400 font-medium px-2 italic">
                        Số dư hiện có: <span id="current-balance" class="font-bold text-indigo-600">0.00 SOL</span>
                    </div>
                    <button onclick="handleTransfer()" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl flex items-center justify-center gap-2 shadow-xl transition-all active:scale-95">
                        XÁC NHẬN GỬI TIỀN
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl shadow-2xl font-bold text-white transition-all z-50"></div>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
