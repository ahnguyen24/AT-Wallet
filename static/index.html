<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IOTA Secure Vault - Hardened</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.1.2/otpauth.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛡️ IOTA Secure Vault</h1>
            <div id="session-timer" class="timer hidden">Vault auto-locks in: <span id="timer-count">15:00</span></div>
        </header>

        <!-- Fixed IDs for style logic -->
        <div id="nav-auth" class="nav-bar">
            <button onclick="showAuth('login')" id="btn-nav-login" style="background:#3b82f6">Login</button>
            <button onclick="showAuth('register')" id="btn-nav-reg">New Identity</button>
        </div>

        <!-- Registration -->
        <div id="register-section" class="card hidden">
            <h3>Identity Enrollment</h3>
            <input type="email" id="reg-email" placeholder="Secure Email">
            <input type="password" id="reg-password" placeholder="Master Password">
            <button onclick="register()" class="btn-wide">Register & Stretch Key</button>
            
            <div id="reg-status" class="status-box hidden">
                <p>Scan with Authenticator:</p>
                <div style="background: white; padding: 15px; display: inline-block; border-radius: 5px;">
                    <div id="qrcode"></div>
                </div>
                <p>Manual Secret: <code id="manual-secret"></code></p>
                <button onclick="generateTestToken()" class="btn-outline">Generate Test Token</button>
                <p>Code: <b id="test-token-display" style="color:#4ade80">-</b></p>
            </div>
        </div>

        <!-- Login -->
        <div id="login-section" class="card">
            <h3>Unlock Vault</h3>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <input type="text" id="login-totp" placeholder="6-Digit 2FA Code">
            <button onclick="login()" class="btn-wide">Authenticate</button>
            <p id="login-status" class="error-text"></p>
        </div>

        <!-- Dashboard -->
        <div id="dashboard-section" class="card hidden">
            <h3>Vault Active</h3>
            <div class="stats">
                <p>ID: <small id="display-userid"></small></p>
                <div class="balance-area">
                    <h2 style="margin:0"><span id="display-balance">0</span> <small>Glow</small></h2>
                </div>
                <p><code id="display-address" style="font-size: 10px; word-break: break-all;">Not created</code></p>
            </div>
            <div class="btn-group">
                <button onclick="createWallet()" id="btn-create">Initialize Wallet</button>
                <button onclick="checkBalance()" class="btn-outline">Sync Tangle</button>
                <button onclick="logout()" class="btn-outline" style="border-color:#ef4444">Lock Vault</button>
            </div>
        </div>

        <!-- Transfer -->
        <div id="transfer-section" class="card hidden">
            <h3>Enveloped Transfer</h3>
            <input type="text" id="tx-recipient" placeholder="Recipient (rms1...)">
            <input type="number" id="tx-amount" placeholder="Amount">
            <button onclick="sendTransfer()" class="btn-danger btn-wide">Sign & Authorize</button>
            <p id="tx-status" style="font-size: 12px; margin-top: 10px;"></p>
        </div>

        <!-- Audit -->
        <div id="audit-section" class="card hidden">
            <h3>Security Audit Logs</h3>
            <button onclick="viewLogs()" class="btn-outline btn-wide">Fetch Recent Alerts</button>
            <div id="log-display" style="font-size: 11px; margin-top:10px; max-height: 150px; overflow-y: auto;"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
