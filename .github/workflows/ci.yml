name: Security Audit & Hardened Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  # Secret mock for compilation safety (the runner needs to see it exists)
  JWT_SECRET: "ci_placeholder_key_9f8b47e2a1c0d3e4f5a6b7c8d9e0f1a2"

jobs:
  # JOB 1: Code Quality & Linting
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy (Static Analysis)
        run: cargo clippy -- -D warnings

  # JOB 2: Dependency Security Audit
  security-audit:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run RustSec Advisory Database Scan
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # JOB 3: Hardened Release Compilation
  compile-release:
    name: Compile Hardened Binary
    needs: [lint-and-format, security-audit]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt update
          sudo apt install -y pkg-config libssl-dev sqlite3 libudev-dev

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Create Mock Database for Build
        run: touch wallet.db

      - name: Compile Hardened Release Binary
        run: cargo build --release

      - name: Upload Hardened Artifact
        uses: actions/upload-artifact@v3
        with:
          name: iota-secure-wallet-binary
          path: target/release/iota-secure-wallet